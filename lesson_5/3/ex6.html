<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title></title>
    <style>
     
    </style>
  </head>
  <body>
    <form action="#" method="post">
      <fieldset>
        <label>
          First Name
          <input type="text" name="first_name" value="Tom">
        </label>
      </fieldset>
      <fieldset>
        <label for="password">Password</label>
        <input type="password" name="password" id="password" value="Not-good-password" size="35">
      </fieldset>
      <fieldset>
        <label>
          Email
          <input type="email" name="email" placeholder="username@domain">
        </label>
      </fieldset>
      <fieldset>
        <label>
          Phone
          <input type="tel" name="phone" placeholder="(123) 456-7890">
        </label>
      </fieldset>
      <fieldset>
        <label>
          <input type="checkbox" name="choice" value="search">
          Sort search results
        </label>

        <label>
          <input type="checkbox" name="choice" value="google" checked>
          Search on Google
        </label>

        <label>
          <input type="checkbox" name="choice" value="recent" checked>
          Recent results (within last year)
        </label>
      </fieldset>
      <fieldset>
        <label>
          <input type="checkbox" name="search">
          Sort search results
        </label>

        <label>
          <input type="checkbox" name="google" checked>
          Search on Google
        </label>

        <label>
          <input type="checkbox" name="recent" checked>
          Recent results (within last year)
        </label>
      </fieldset>
      <fieldset>
        <label>
          <input type="radio" name="color" value="red">
          Red
        </label>

        <label>
          <input type="radio" name="color" value="green" checked>
          Green
        </label>

        <label>
          <input type="radio" name="color" value="blue">
          Blue
        </label>
      </fieldset>
      <fieldset>
        <input type="submit" value="Save">
      </fieldset>
      <fieldset>
        <input type="reset" value="Clear Form">
      </fieldset>
    </form>
  </body>
</html>
