<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Contact Form</title>
    <style>
     input[type="radio"] {
      margin: 0;
     }
    </style>
  </head>
  <body>
    <form action="#" method="post">
      <fieldset>
        <label for="search">Search for</label>
        <input type="text" name="search" id="search">

        <label>
          <input type="radio" name="search-type">
          TV
        </label>

        <label>
          <input type="radio" name="search-type">
          Movies
        </label>

        <label>
          <input type="radio" name="search-type">
          Music
        </label>

        <button>Search</button>
      </fieldset>
    </form>
  </body>
</html>
