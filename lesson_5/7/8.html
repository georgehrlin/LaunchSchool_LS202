<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Contact Form</title>
    <style>
      button { display: block; }
    </style>
  </head>
  <body>
    <form action="#" method="post">
      <fieldset>
        <dl>
          <dt><label for="movie">Movie</label></dt>
          <dd>
            <select name="movie" id="movie">
              <option>Looper</option>
              <option>Frozen</option>
              <option>Tommy Boy</option>
            </select>
          </dd>

          <dt><label for="rating">Rating</label></dt>
          <dd>
            <select name="rating" id="rating">
              <option>1</option>
              <option>2</option>
              <option>3</option>
              <option>4</option>
              <option>5</option>
            </select>
          </dd>
        </dl>

        <input type="checkbox" name="addt-to-favorites" selected>Add to my favorites
        <button>Rate movie</button>
      </fieldset>
    </form>
  </body>
</html>
