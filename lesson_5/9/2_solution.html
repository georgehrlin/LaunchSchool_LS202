<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <title>Contact Form</title>
    <style>
      body {
        font: normal 16px Helvetica, Arial, sans-serif;
      }

      fieldset {
        border: none;
        margin: 0 auto;
        padding: 0;
        width: 600px;
      }

      .partial {
        box-sizing: border-box;
        display: inline-block;
      }

      .one_half {
        width: 50%;
      }

      .left {
        padding-right: 5px;
      }

      .right {
        padding-left: 5px;
      }

      dt {
        margin-bottom: 5px;
      }
      dd {
        margin: 0 0 25px;
      }

      input[type="text"],
      input[type="email"],
      input[type="number"],
      textarea {
        border: 1px solid #cecece;
        box-sizing: border-box;
        height: 25px;
        font: normal 14px Helvetica, Arial, sans-serif;
        width: 100%;
      }

      textarea {
        height: auto;
        resize: vertical;
      }

      ul {
        font-size: 14px;
        list-style: none;
        padding-left: 0;
      }
    </style>
  </head>
  <body>
    <form action="#" method="post">
      <fieldset>
        <dl class="partial one_half left">
          <dt><label for="first_name">First Name</label></dt>
          <dd><input type="text" name="first_name" id="first_name"></dd>
        </dl><!-- 

     --><dl class="partial one_half right">
          <dt><label for="last_name">Last Name</label></dt>
          <dd><input type="text" name="last_name" id="last_name"></dd>
        </dl>

        <dl>
          <dt><label for="email">Email Address</label></dt>
          <dd><input type="email" name="email" id="email"></dd>
        </dl>

        <dl>
          <dt><label for="city">City</label></dt>
          <dd><input type="text" name="city" id="city"></dd>
        </dl>

        <dl>
          <dt><label for="state">State</label></dt>
          <dd>
            <select name="state" id="state">
              <option>AK</option>
              <option>AL</option>
              <option>AR</option>
              <option>AZ</option>
              <option>CA</option>
              <option>CO</option>
              <option>CT</option>
              <option>DC</option>
              <option>DE</option>
              <option>FL</option>
              <option>GA</option>
              <option>HI</option>
              <option>IA</option>
              <option>ID</option>
              <option>IL</option>
              <option>IN</option>
              <option>KS</option>
              <option>KY</option>
              <option>LA</option>
              <option>MA</option>
              <option>MD</option>
              <option>ME</option>
              <option>MI</option>
              <option>MN</option>
              <option>MO</option>
              <option>MS</option>
              <option>MT</option>
              <option>NC</option>
              <option>ND</option>
              <option>NE</option>
              <option>NH</option>
              <option>NJ</option>
              <option>NM</option>
              <option>NV</option>
              <option>NY</option>
              <option>OH</option>
              <option>OK</option>
              <option>OR</option>
              <option>PA</option>
              <option>RI</option>
              <option>SC</option>
              <option>SD</option>
              <option>TN</option>
              <option>TX</option>
              <option>UT</option>
              <option>VA</option>
              <option>VT</option>
              <option>WA</option>
              <option>WI</option>
              <option>WV</option>
              <option>WY</option>
            </select>
          </dd>
        </dl>

        <dl>
          <dt><label for="zip">Zip</label></dt>
          <dd><input type="number" name="zip" id="zip" pattern="[0-9]{5}"></dd>
        </dl>

        <p>Which of these colors do you most prefer?</p>
        <ul>
          <li><label><input type="radio" name="favorite_color" value="red" >Red</label></li>
          <li><label><input type="radio" name="favorite_color" value="orange" >Orange</label></li>
          <li><label><input type="radio" name="favorite_color" value="yellow" >Yellow</label></li>
          <li><label><input type="radio" name="favorite_color" value="green" >Green</label></li>
          <li><label><input type="radio" name="favorite_color" value="indigo" >Indigo</label></li>
          <li><label><input type="radio" name="favorite_color" value="blue" >Blue</label></li>
          <li><label><input type="radio" name="favorite_color" value="violet" >Violet</label></li>
        </ul>

        <p>What web technologies do you want to hear more about?</p>
        <ul>
          <li><label><input type="checkbox" name="technologies[]" value="HTML">HTML</label></li>
          <li><label><input type="checkbox" name="technologies[]" value="CSS">CSS</label></li>
          <li><label><input type="checkbox" name="technologies[]" value="JavaScript">JavaScript</label></li>
          <li><label><input type="checkbox" name="technologies[]" value="Ruby">Ruby</label></li>
          <li><label><input type="checkbox" name="technologies[]" value="Rails">Rails</label></li>
        </ul>

        <dl>
         <dt><label for="comments">Comments</label></dt>
         <dd><textarea rows="6" cols="80" id="comments"></textarea></dd>
        </dl>

        <input type="hidden" name="timestamp" value="2026-04-18">
        <input type="submit" value="Send">
        <input type="reset">
      </fieldset>
    </form>
  </body>
</html>
