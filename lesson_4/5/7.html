<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title></title>
    <style>
      th[scope="col"] {
        color: green;
      }

      th[scope="row"] {
        color: blue;
      }
    </style>
  </head>
  <body>
    <table>
      <thead>
        <th scope="col">Name</th>  <!-- scope value must be col -->
        <th scope="col">Major</th> <!-- scope value must be col -->
        <th scope="col">GPA</th>   <!-- scope value must be col -->
      </thead>
      <tbody>
        <tr>
          <th scope="row">Chris Lee</th>
          <td>Supply Chain Management</td>
          <td>3.7</td>
        </tr>
        <tr>
          <th scope="row">Shane Riley</th>
          <td>Photojournalism</td>
          <td>3.8</td>
        </tr>
        <tr>
          <th scope="row">Kevin Wang</th>
          <td>Computer Science</td>
          <td>4.0</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
