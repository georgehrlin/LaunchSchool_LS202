<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title></title>
    <style>
      html {
        font-size: 20px;
      }

      nav ul {
        background-color: yellow;
        list-style: none;
        padding-inline-start: 0;
        width: 200px;
      }

      nav li {
        color: blue;
      }

      nav a {
        box-sizing: border-box;
        line-height: 2.5;
        padding: 0 10px;
        text-decoration: none;
        width: 100%;
      }

      nav li:hover,
      nav a:hover {
        background-color: green;
        color: yellow;
      }
    </style>
  </head>
  <body>
    <nav>
      <ul>
        <li>
          <a href="#">Home</a>
        </li>
        <li>
          <a href="#">Projects</a>
        </li>
        <li>
          <a href="#">Team</a>
        </li>
        <li>
          <a href="#">Help</a>
        </li>
      </ul>
    </nav>
  </body>
</html>

<!--
Notes
The official solution applies :hover and :focus on nav a instead of nav lit because it expands the entire <a> into a complete "tile" (instead of just the line of text) by using display: inline-block.
-->
