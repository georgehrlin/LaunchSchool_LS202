<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title></title>
    <style>
      html {
        font-size: 20px;
      }

      nav ul {
        background-color: yellow;
        list-style: none;
        padding: 0;
      }

      nav li {
        display: inline-block;
        color: blue;
        width: 25%;
      }

      nav a {
        box-sizing: border-box;
        display: block;
        line-height: 2.5;
        text-align: center;
        text-decoration: none;
      }

      nav a:hover,
      nav a:focus {
        background-color: green;
        color: yellow;
      }
    </style>
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="#">Home</a></li><li>
            <a href="#">Projects</a></li><li>
            <a href="#">Team</a></li><li>
            <a href="#">Help</a></li>
      </ul>
    </nav>
  </body>
</html>
