<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title></title>

     .parent {
      border: solid 1px grey;
      display: flex;
      flex-flow: row wrap;
      justify-content: space-around;
     }

     .child {
      background-color: lightgreen;
      color: white;
      font-size: 40px;
      line-height: 100px;
      height: 100px;
      width: 100px;
      margin: auto 10px;
      text-align: center;
     }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child">
        1
      </div>
      <div class="child">
        2
      </div>
      <div class="child">
        3
      </div>
      <div class="child">
        4
      </div>
      <div class="child">
        5
      </div>
      <div class="child">
        6
      </div>
    </div>
  </body>
</html>
