<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title></title>
    <style>
      .form-row {
        padding: 10px 0;
        display: flex;
      }

      .form-row label {
        padding-right: 10px;
      }

      .form-row input {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <form action="#">
        <div class="form-row">
          <label for="name">Name:</label>
          <input type="text" name="name" id="name">
        </div>
        <div class="form-row">
          <label class="favourite_color">Favourite Color:</label>
          <input type="text" name="favourite_color" id="favourite_color">
        </div>
      </form>
    </div>
  </body>
</html>
