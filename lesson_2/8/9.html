<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title></title>
    <style>
      div {
        box-sizing: border-box;
        height: 300px;
        width: 300px;
      }

      #red {
        display: inline-block;
        background-color: #fcc;
        padding: 20px;
      }

      #blue {
        display: inline-block;
        background-color: #ccf;
        border: 5px solid black;
      }

      #spacing {
        display: inline-block;
        height: auto;
        width: 20px;
      }
    </style>
  </head>
  <body>
    <div id="red"></div><div id="spacing"></div><div id="blue"></div>
  </body>
</html>
