<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title></title>
    <style>
      img {
        display: block;
        height: 533px;
        margin: 0 auto;
        max-width: 800px;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <img src="https://d3jtzah944tvom.cloudfront.net/lesson_2/exercises_dimension_and_spacing/H%C3%B4tel_des_Invalides_-_20150801_16h09_%2810630%29.jpg"
    alt="Demonstration of image sizing">
  </body>
</html>

<!-- Notes
With a fixed height of 533px and a variable width of 100%, the <img> compresses horizontally when the window is too narrow to fit the entire image's width, but it does not compresses and is cropped instead when the window is too short vertically. -->
