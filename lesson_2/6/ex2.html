<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title></title>
    <style>
      .hit-area-button {
        padding: 16px;
        border: none;
        background: transparent;
        cursor: pointer;
      }

      .button-visual {
        display: inline-block;
        background: #4285f4;
        color: white;
        padding: 4px 8px;
        border-radius: 4px;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <button class="hit-area-button">
      <span class="button-visual">Click me</span>
    </button>
  </body>
</html>
